<!-- MAIN -->

<header>
<div class="breadcrumb">GoLaunch AI Platform</div>
<h1>Submit Idea</h1>
<p class="subtitle">Enter your product idea to analyze its launch viability</p>
</header>

<div class="card">

<form>

<div style="margin-bottom:20px;">
<label>Product Name</label><br>
<input type="text" placeholder="Example: Smart Waste Segregation System" style="width:100%;padding:12px;margin-top:5px;">
</div>

<div style="margin-bottom:20px;">
<label>Problem Statement</label><br>
<textarea rows="4" placeholder="What problem does your product solve?" style="width:100%;padding:12px;margin-top:5px;"></textarea>
</div>

<div style="margin-bottom:20px;">
<label>Target Market</label><br>
<input type="text" placeholder="Example: Residential societies, municipalities" style="width:100%;padding:12px;margin-top:5px;">
</div>

<div style="margin-bottom:20px;">
<label>Key Features</label><br>
<textarea rows="4" placeholder="List main product features" style="width:100%;padding:12px;margin-top:5px;"></textarea>
</div>

<button style="background:#2dd4bf;border:none;padding:12px 20px;border-radius:8px;font-weight:600;">
Analyze Idea
</button>

</form>

</div>

</main>
